<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Access – Yatta-Yam-Yam</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>

    <style>
        .version-footer {
            text-align: right;
            font-size: 11px;
            color: #adb5bd;
            padding: 16px;
            margin-top: 24px;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="card shadow-lg p-4" style="width: 100%; max-width: 420px;">
    <div class="text-center mb-4">
        <div class="app-icon mb-2">🔑</div>
        <p class="text-muted">Enter the access password to continue</p>
    </div>

    <!-- Error message -->
    <div th:if="${param.error}" class="alert alert-warning alert-dismissible fade show" role="alert">
        Incorrect password. Please try again.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Logged out message -->
    <div th:if="${param.logout}" class="alert alert-info alert-dismissible fade show" role="alert">
        You have been logged out.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" name="remember-me" value="true"/>
        <div class="mb-3">
            <input type="hidden"
                   id="username"
                   name="username"
                   class="form-control form-control-lg"
                   value="yatta"
                   required/>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input type="password"
                   id="password"
                   name="password"
                   class="form-control form-control-lg"
                   placeholder="••••••••"
                   autofocus
                   required/>
        </div>
        <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Unlock →</button>
        </div>
    </form>

    <div class="version-footer" th:text="'v' + ${@environment.getProperty('spring.application.version')}">v?</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
