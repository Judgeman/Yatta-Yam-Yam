<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Welcome – Yatta-Yam-Yam</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>

    <style>
        .version-footer {
            text-align: right;
            font-size: 11px;
            color: #adb5bd;
            padding: 16px;
            margin-top: 24px;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="card shadow-lg p-4" style="width: 100%; max-width: 420px;">
    <div class="text-center mb-4">
        <img src="/images/logo.png" alt="Yatta-Yam-Yam" style="width:220px; margin-bottom:12px;"/>
        <h2 class="fw-bold">Welcome to<br/>Yatta-Yam-Yam</h2>
        <p class="text-muted">Enter your name to get started</p>
    </div>

    <!-- Error message -->
    <div th:if="${error}" class="alert alert-warning alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form th:action="@{/check-name}" method="post">
        <div class="mb-3">
            <label for="name" class="form-label fw-semibold">Your Name</label>
            <input type="text"
                   id="name"
                   name="name"
                   class="form-control form-control-lg"
                   placeholder="e.g. Alice"
                   autofocus
                   required
                   maxlength="50"/>
        </div>
        <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Continue →</button>
        </div>
    </form>

    <div class="version-footer"><a th:href="@{/version}" th:text="'v' + ${@environment.getProperty('spring.application.version')}">v?</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
