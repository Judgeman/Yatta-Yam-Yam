<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Edit Order – Yatta-Yam-Yam</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/orders/dashboard}">Yatta-Yam-Yam</a>
    </div>
</nav>

<div class="container py-4" style="max-width: 600px;">
    <a th:href="@{'/orders/' + ${order.id}}" class="btn btn-outline-secondary btn-sm mb-4">
        <i class="bi bi-arrow-left"></i> Back to Order
    </a>

    <div class="card shadow-sm p-4">
        <h3 class="fw-bold mb-4">✏️ Edit Order</h3>

        <form th:action="@{'/orders/' + ${order.id} + '/edit'}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Place Name</label>
                <input type="text" name="placeName" class="form-control form-control-lg"
                       th:value="${order.placeName}" required maxlength="100"/>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Order Date</label>
                <input type="date" name="orderDate" class="form-control form-control-lg"
                       th:value="${order.orderDate}" required/>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Tip Amount (€) <span class="text-muted fw-normal small">– split equally per person</span></label>
                <div class="input-group">
                    <span class="input-group-text">€</span>
                    <input type="number" name="tipAmount" class="form-control form-control-lg"
                           th:value="${order.tipAmount}" step="0.01" min="0" placeholder="0.00"/>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">PayPal Link <span class="text-muted fw-normal small">(optional)</span></label>
                <input type="url" name="paypalLink" class="form-control"
                       th:value="${order.paypalLink}" placeholder="https://paypal.me/..."/>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Wero Link <span class="text-muted fw-normal small">(optional)</span></label>
                <input type="url" name="weroLink" class="form-control"
                       th:value="${order.weroLink}" placeholder="https://wero.de/..."/>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
            </div>
        </form>
    </div>

    <div class="version-footer"><a th:href="@{/version}" th:text="'v' + ${@environment.getProperty('spring.application.version')}">v?</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
