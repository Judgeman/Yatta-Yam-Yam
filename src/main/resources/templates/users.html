<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Users – Yatta-Yam-Yam</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}"/>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/orders/dashboard}">Yatta-Yam-Yam</a>
    </div>
</nav>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0"><i class="bi bi-people"></i> All Users</h2>
            <p class="text-muted mb-0" th:text="${userStats.size()} + ' registered user(s)'"></p>
        </div>
        <a th:href="@{/orders/dashboard}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Dashboard
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>User</th>
                    <th>Member Since</th>
                    <th class="text-center">Orders Joined</th>
                    <th class="text-end">Total Spent</th>
                    <th class="text-center">Open Payments</th>
                    <th class="text-end">Amount Due</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="stat : ${userStats}">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="mini-avatar"
                                 th:text="${#strings.toUpperCase(#strings.substring(stat.name,0,1))}">A</div>
                            <span class="fw-semibold" th:text="${stat.name}">Name</span>
                        </div>
                    </td>
                    <td class="text-muted small">
                            <span th:if="${stat.registeredAt != null}"
                                  th:text="${#temporals.format(stat.registeredAt,'dd MMM yyyy')}">-</span>
                        <span th:if="${stat.registeredAt == null}" class="text-muted">N/A</span>
                    </td>
                    <td class="text-center">
                            <span class="badge bg-primary rounded-pill"
                                  th:text="${stat.participated}">0</span>
                    </td>
                    <td class="text-end fw-semibold text-success"
                        th:text="'€' + ${#numbers.formatDecimal(stat.totalSpent,1,2)}">€0.00</td>
                    <td class="text-center">
                            <span th:if="${stat.openPayments == 0}"
                                  class="badge bg-success">All paid</span>
                        <span th:if="${stat.openPayments > 0}"
                              class="badge bg-warning text-dark"
                              th:text="${stat.openPayments} + ' open'">0</span>
                    </td>
                    <td class="text-end">
                        <span th:if="${stat.openAmount == 0}" class="text-muted">—</span>
                        <span th:if="${stat.openAmount > 0}"
                              class="fw-bold text-danger"
                              th:text="'€' + ${#numbers.formatDecimal(stat.openAmount,1,2)}">€0.00</span>
                    </td>
                </tr>
                </tbody>
                <tfoot class="table-light">
                <tr>
                    <td colspan="3" class="fw-bold">Total</td>
                    <td class="text-end fw-bold text-success"
                        th:text="'€' + ${#numbers.formatDecimal(totalSpentAll,1,2)}">€0.00</td>
                    <td></td>
                    <td class="text-end fw-bold text-danger"
                        th:text="'€' + ${#numbers.formatDecimal(openAmountAll,1,2)}">€0.00</td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="version-footer"
         th:text="'v' + ${@environment.getProperty('spring.application.version')}">v?</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
