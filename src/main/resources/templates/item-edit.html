<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Edit Item – Yatta-Yam-Yam</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/orders/dashboard}">Yatta-Yam-Yam</a>
    </div>
</nav>

<div class="container py-4" style="max-width: 560px;">
    <a th:href="${orderId != null} ? @{'/orders/' + ${orderId}} : @{'/orders/itemlist/' + ${itemList.id} + '/items'}"
       class="btn btn-outline-secondary btn-sm mb-4">
        <i class="bi bi-arrow-left"></i> Back
    </a>

    <div class="card shadow-sm p-4">
        <h3 class="fw-bold mb-1">✏️ Edit Item</h3>
        <p class="text-muted mb-4" th:text="'In list: ' + ${itemList.name}">List</p>

        <form th:action="@{'/orders/itemlist/' + ${itemList.id} + '/items/' + ${item.id} + '/edit'}"
              method="post" enctype="multipart/form-data">
            <input type="hidden" name="orderId" th:value="${orderId}"/>

            <div class="mb-3">
                <label class="form-label fw-semibold">Item Name</label>
                <input type="text" name="name" class="form-control form-control-lg"
                       th:value="${item.name}" required maxlength="100"/>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Price</label>
                <div class="input-group">
                    <span class="input-group-text">€</span>
                    <input type="number" name="price" class="form-control form-control-lg"
                           th:value="${item.price}" step="0.01" min="0" required/>
                </div>
            </div>

            <!-- Current image preview -->
            <div th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}" class="mb-3">
                <label class="form-label fw-semibold">Current Image</label>
                <div>
                    <img th:src="${item.imageUrl}" alt="Current image"
                         style="height:80px; border-radius:8px; object-fit:cover;"/>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    New Image URL
                    <span class="text-muted fw-normal small">(optional — replaces current)</span>
                </label>
                <input type="text" name="imageUrl" class="form-control"
                       th:value="${item.imageUrl}"
                       placeholder="https://example.com/image.jpg"/>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Or Upload New Image
                    <span class="text-muted fw-normal small">(optional — replaces current)</span>
                </label>
                <input type="file" name="imageFile" class="form-control" accept="image/*"
                       onchange="checkFileSize(this, 100)"/>
                <small class="text-muted">Max file size: 100 MB</small>
                <div class="text-danger small mt-1" id="fileSizeError" style="display:none">
                    <i class="bi bi-exclamation-triangle"></i>
                    File is too large. Maximum allowed size is 100 MB.
                </div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
                <a th:href="${orderId != null} ? @{'/orders/' + ${orderId}} : @{'/orders/itemlist/' + ${itemList.id} + '/items'}"
                   class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <div class="version-footer"
         th:text="'v' + ${@environment.getProperty('spring.application.version')}">v?</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
