<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Archive – Yatta-Yam-Yam</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/orders/dashboard}">Yatta-Yam-Yam</a>
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/orders/dashboard}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-house"></i> Dashboard
            </a>
            <a th:href="@{/}" class="d-flex align-items-center gap-2 text-decoration-none">
                <div class="user-badge">
                    <span th:text="${#strings.toUpperCase(#strings.substring(user.name,0,1))}">A</span>
                </div>
                <span class="text-white fw-semibold" th:text="${user.name}">Name</span>
            </a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-archive"></i> Archived Orders</h2>
        <p class="text-muted" th:text="${orders.size()} + ' archived order(s)'"></p>
    </div>

    <div th:if="${orders.empty}" class="text-center py-5">
        <div class="empty-icon mb-3">📦</div>
        <h4 class="fw-bold">No archived orders</h4>
        <p class="text-muted">Completed orders will appear here.</p>
    </div>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="order : ${orders}">
            <a th:href="@{'/orders/' + ${order.id}}" class="order-card-link">
                <div class="order-card archived">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="order-status-badge badge-archived">ARCHIVED</span>
                        <span class="text-muted small" th:text="${#temporals.format(order.orderDate,'dd MMM yyyy')}">Date</span>
                    </div>
                    <h5 class="fw-bold mb-1" th:text="${order.placeName}">Place</h5>
                    <div class="text-muted small mb-2">
                        <i class="bi bi-person"></i>
                        Created by <span th:text="${order.creator.name}">Owner</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="text-muted small">
                            <i class="bi bi-people"></i>
                            <span th:text="${order.selections.size()}">0</span> participant(s)
                        </span>
                        <span class="text-primary fw-semibold small">View →</span>
                    </div>

                    <!-- All paid -->
                    <div th:if="${allPaidMap[order.id]}"
                         class="alert alert-success py-1 px-2 small mb-0">
                        <i class="bi bi-check-circle-fill"></i> All paid!
                    </div>

                    <!-- Open payments -->
                    <div th:if="${!allPaidMap[order.id] and openAmountMap[order.id] gt 0}"
                         class="alert alert-warning py-1 px-2 small mb-0">
                        <i class="bi bi-exclamation-circle"></i> Open:
                        <strong th:text="'€' + ${#numbers.formatDecimal(openAmountMap[order.id],1,2)}"></strong>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <div class="version-footer" th:text="'v' + ${@environment.getProperty('spring.application.version')}">v?</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
