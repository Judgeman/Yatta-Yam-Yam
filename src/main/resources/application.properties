spring.application.name=yatta-yam-yam
spring.application.version=@project.version@

server.port=38443

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:file:./data/yatta_yam_yam_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.sql.init.mode=always

# H2 Console (optional for dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

# Spring security
spring.security.user.name=yatta
spring.security.user.password=${YATTA_YAM_YAM_PASSWORD}

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

server.tomcat.max-http-form-post-size=100MB