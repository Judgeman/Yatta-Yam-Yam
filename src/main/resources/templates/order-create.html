<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>New Order – Yatta-Yam-Yam</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/orders/dashboard}">Yatta-Yam-Yam</a>
    </div>
</nav>

<div class="container py-4" style="max-width: 600px;">
    <a th:href="@{/orders/dashboard}" class="btn btn-outline-secondary btn-sm mb-4">
        <i class="bi bi-arrow-left"></i> Back
    </a>

    <div class="card shadow-sm p-4">
        <h3 class="fw-bold mb-4">🍽️ Create New Order</h3>

        <form th:action="@{/orders/create}" method="post">

            <div class="mb-3">
                <label class="form-label fw-semibold">Place Name</label>
                <input type="text" name="placeName" class="form-control form-control-lg"
                       placeholder="e.g. Pizza Palace" required maxlength="100"/>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Order Date</label>
                <input type="date" name="orderDate" class="form-control form-control-lg"
                       th:value="${today}" required/>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Item List</label>

                <!-- Existing lists -->
                <div th:if="${!itemLists.empty}">
                    <div class="mb-2" th:each="list : ${itemLists}">
                        <div class="form-check item-list-option p-3">
                            <input class="form-check-input" type="radio" name="itemListId"
                                   th:value="${list.id}" th:id="'list_' + ${list.id}"
                                   onclick="document.getElementById('newListSection').style.display='none'"/>
                            <label class="form-check-label w-100" th:for="'list_' + ${list.id}">
                                <span class="fw-semibold" th:text="${list.name}">List name</span>
                                <span class="text-muted small ms-2"
                                      th:text="${list.items.size()} + ' items'"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Create new list option -->
                <div class="form-check item-list-option p-3">
                    <input class="form-check-input" type="radio" name="itemListId"
                           value="0" id="listNew"
                           th:checked="${itemLists.empty}"
                           onclick="document.getElementById('newListSection').style.display='block'"/>
                    <label class="form-check-label" for="listNew">
                        <i class="bi bi-plus-circle text-primary"></i>
                        <span class="fw-semibold ms-1">Create new item list</span>
                    </label>
                </div>

                <div id="newListSection" th:style="${itemLists.empty} ? '' : 'display:none'" class="mt-3">
                    <input type="text" name="newListName" class="form-control"
                           placeholder="List name, e.g. Pizza Menu"/>
                    <small class="text-muted">You can add items after creating the order.</small>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Create Order →</button>
            </div>
        </form>
    </div>

    <div class="version-footer"><a th:href="@{/version}" th:text="'v' + ${@environment.getProperty('spring.application.version')}">v?</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
