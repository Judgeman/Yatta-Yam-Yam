<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>New Account – Yatta-Yam-Yam</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>

    <style>
        .version-footer {
            text-align: right;
            font-size: 11px;
            color: #adb5bd;
            padding: 16px;
            margin-top: 24px;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="card shadow-lg p-4 text-center" style="width: 100%; max-width: 420px;">
    <div class="app-icon mb-3">🎉</div>
    <h2 class="fw-bold mb-2">New account created!</h2>
    <p class="text-muted mb-4">
        Welcome, <strong class="text-primary" th:text="${name}">Name</strong>!
        Your account has been created. Ready to continue?
    </p>

    <form th:action="@{/confirm-new-login}" method="post" class="d-grid gap-2 mb-2">
        <input type="hidden" name="name" th:value="${name}"/>
        <button type="submit" class="btn btn-primary btn-lg">
            🚀 Let's go!
        </button>
    </form>

    <form action="/" method="get" class="d-grid">
        <button type="submit" class="btn btn-outline-secondary btn-lg">
            ← Use a different name
        </button>
    </form>

    <div class="version-footer"><a th:href="@{/version}" th:text="'v' + ${@environment.getProperty('spring.application.version')}">v?</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
